aid: openstates
name: Open States
description: 'Open States is a civic technology project that aggregates and publishes
  legislative data for all 50 US states, Washington DC, Puerto Rico, and select municipal
  governments. It provides a REST API (v3) and a deprecated GraphQL API (v2) for programmatic
  access to bill text, sponsors, votes, legislators, committee information, and legislative
  events. Data is also available via bulk downloads. The project is maintained by
  Plural Policy as open civic infrastructure.

  '
